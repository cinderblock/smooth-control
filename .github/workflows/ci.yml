name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['22', '24']
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Show versions
        run: |
          node --version
          npm --version

      - name: Install libudev-dev (needed by `usb` for libusb)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libudev-dev

      - name: Install dependencies
        run: npm ci || npm install

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
